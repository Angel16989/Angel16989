    <text x="104" y="31" fill="#64748b" font-family="Cascadia Code, Consolas, 'Courier New', monospace" font-size="13">rasik@analytics:~$ snowflake --run insights.sql | tableau --publish</text>
    <circle cx="1096" cy="26" r="4" fill="#0d9488"/>
    <text x="1108" y="31" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1">LIVE</text>

