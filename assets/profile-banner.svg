    <text x="72" y="204" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="800">Rasik Tiwari</text>
    <text x="74" y="246" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Turning messy data into decisions people trust.</text>

    <text x="74" y="290" font-family="Cascadia Code, Consolas, 'Courier New', monospace" font-size="16"><tspan fill="#8b5cf6" font-weight="700">SELECT</tspan><tspan fill="#e2e8f0"> insight </tspan><tspan fill="#8b5cf6" font-weight="700">FROM</tspan><tspan fill="#38bdf8"> raw_data </tspan><tspan fill="#8b5cf6" font-weight="700">WHERE</tspan><tspan fill="#e2e8f0"> noise = </tspan><tspan fill="#2dd4bf">0</tspan><tspan fill="#e2e8f0">;</tspan></text>

