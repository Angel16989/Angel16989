    <path d="M680 296 L710 282 L740 290 L770 268 L800 274 L830 252 L860 258 L890 238 L916 228 L916 316 L680 316 Z" fill="url(#sparkFill)"/>
    <path d="M680 296 L710 282 L740 290 L770 268 L800 274 L830 252 L860 258 L890 238 L916 228" stroke="#0284c7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
