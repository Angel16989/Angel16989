      <text x="841" y="162" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1">CORE STACK</text>

      <rect x="970" y="112" width="132" height="64" rx="12" fill="#0f172a" fill-opacity="0.85" stroke="#1e293b"/>
