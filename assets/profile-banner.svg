<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="sparkFill" x1="0" y1="222" x2="0" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0284c7" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#0284c7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 110) rotate(125) scale(360 220)">
      <stop stop-color="#0284c7" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0284c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 360) rotate(-18) scale(390 180)">
      <stop stop-color="#0d9488" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#94a3b8" stroke-opacity="0.06"/>
    </pattern>
    <clipPath id="frame">
      <rect width="1200" height="420" rx="30"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
